<div class="min-h-screen bg-gray-900 text-white pb-20">

  <!-- Header -->
  <div class="bg-gray-800 px-6 py-4 flex items-center justify-between">
    <div>
      <p class="text-gray-400 text-sm">Driver Dashboard</p>
      <h2 class="text-xl font-bold">{{ driverName }}</h2>
    </div>
    <button (click)="logout()"
      class="text-red-400 text-sm hover:text-red-300">
      Logout
    </button>
  </div>

  <div class="px-6 pt-6">

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="bg-gray-800 rounded-2xl p-4 border border-gray-700 text-center">
        <h3 class="text-2xl font-bold text-white">{{ stats.totalDeliveries }}</h3>
        <p class="text-gray-400 text-xs mt-1">Total</p>
      </div>
      <div class="bg-gray-800 rounded-2xl p-4 border border-gray-700 text-center">
        <h3 class="text-2xl font-bold text-yellow-400">{{ stats.pendingDeliveries }}</h3>
        <p class="text-gray-400 text-xs mt-1">Pending</p>
      </div>
      <div class="bg-gray-800 rounded-2xl p-4 border border-gray-700 text-center">
        <h3 class="text-2xl font-bold text-green-400">{{ stats.completedDeliveries }}</h3>
        <p class="text-gray-400 text-xs mt-1">Done</p>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="grid grid-cols-2 gap-4 mb-6">
      <button (click)="router.navigate(['/driver/deliveries'])"
        class="bg-purple-600 hover:bg-purple-700 p-4 rounded-2xl
               font-semibold transition text-center">
        🚗 My Deliveries
      </button>
      <button (click)="router.navigate(['/driver/profile'])"
        class="bg-blue-600 hover:bg-blue-700 p-4 rounded-2xl
               font-semibold transition text-center">
        👤 My Profile
      </button>
    </div>

    <!-- Recent orders -->
    <h3 class="font-bold text-lg mb-3">Recent Deliveries</h3>
    <div class="space-y-3">
      <div *ngFor="let order of recentOrders"
           class="bg-gray-800 rounded-xl p-4 border border-gray-700">
        <div class="flex items-center justify-between mb-2">
          <span class="font-bold">#{{ order.orderId }}</span>
          <span class="text-xs px-2 py-1 rounded-full font-semibold"
                [class]="getStatusClass(order.orderStatus)">
            {{ order.orderStatus }}
          </span>
        </div>
        <p class="text-white text-sm font-semibold">{{ order.customerName }}</p>
        <p class="text-gray-400 text-xs mt-1">📍 {{ order.address }}</p>
      </div>
    </div>

  </div>

</div>
