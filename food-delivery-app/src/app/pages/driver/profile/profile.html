<div class="min-h-screen bg-gray-900 text-white pb-20">

  <div class="bg-gray-800 px-6 py-4 flex items-center gap-4 sticky top-0 z-50">
    <button (click)="router.navigate(['/driver/dashboard'])"
      class="text-gray-400 hover:text-white text-xl">←</button>
    <h2 class="text-xl font-bold">Driver Profile</h2>
  </div>

  <div class="px-6 pt-6 space-y-4">

    <!-- Profile header -->
    <div class="bg-purple-600 rounded-2xl p-6 text-center">
      <div class="w-20 h-20 bg-white rounded-full flex items-center
                  justify-center text-3xl font-bold text-purple-600
                  mx-auto mb-3">
        {{ driver?.driverName?.charAt(0) }}
      </div>
      <h2 class="text-2xl font-bold">{{ driver?.driverName }}</h2>
      <p class="text-purple-100 text-sm mt-1">📞 {{ driver?.driverPhone }}</p>
      <span class="bg-white text-purple-600 text-sm font-bold
                   px-4 py-1 rounded-full mt-2 inline-block">
        🚗 {{ driver?.driverVehicle }}
      </span>
    </div>

    <!-- Details -->
    <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700">

      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold">Driver Details</h3>
        <button (click)="editMode = !editMode"
          class="text-purple-400 text-sm hover:underline">
          {{ editMode ? 'Cancel' : 'Edit' }}
        </button>
      </div>

      <!-- View mode -->
      <div *ngIf="!editMode" class="space-y-3">
        <div class="flex justify-between py-2 border-b border-gray-700">
          <span class="text-gray-400 text-sm">Name</span>
          <span class="text-sm font-semibold">{{ driver?.driverName }}</span>
        </div>
        <div class="flex justify-between py-2 border-b border-gray-700">
          <span class="text-gray-400 text-sm">Phone</span>
          <span class="text-sm font-semibold">{{ driver?.driverPhone }}</span>
        </div>
        <div class="flex justify-between py-2">
          <span class="text-gray-400 text-sm">Vehicle</span>
          <span class="text-sm font-semibold">{{ driver?.driverVehicle }}</span>
        </div>
      </div>

      <!-- Edit mode -->
      <div *ngIf="editMode" class="space-y-3">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Name</label>
          <input type="text" [(ngModel)]="form.driverName"
                 class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600
                        focus:border-purple-500 outline-none text-white"/>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Phone</label>
          <input type="text" [(ngModel)]="form.driverPhone"
                 class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600
                        focus:border-purple-500 outline-none text-white"/>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Vehicle</label>
          <select [(ngModel)]="form.driverVehicle"
                  class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600
                         focus:border-purple-500 outline-none text-white">
            <option value="Car">Car</option>
            <option value="Bike">Bike</option>
            <option value="Scooter">Scooter</option>
          </select>
        </div>
        <button (click)="update()"
          class="w-full bg-purple-600 hover:bg-purple-700 p-3
                 rounded-xl font-semibold transition">
          Save Changes
        </button>
      </div>

    </div>

    <!-- Stats -->
    <div class="bg-gray-800 rounded-2xl p-6 border border-gray-700">
      <h3 class="font-bold mb-4">Delivery Stats</h3>
      <div class="grid grid-cols-2 gap-4">
        <div class="bg-gray-900 rounded-xl p-4 text-center">
          <h3 class="text-2xl font-bold text-green-400">22</h3>
          <p class="text-gray-400 text-xs mt-1">Completed</p>
        </div>
        <div class="bg-gray-900 rounded-xl p-4 text-center">
          <h3 class="text-2xl font-bold text-yellow-400">3</h3>
          <p class="text-gray-400 text-xs mt-1">Pending</p>
        </div>
      </div>
    </div>

    <button (click)="logout()"
      class="w-full bg-red-600 hover:bg-red-700 p-4
             rounded-2xl font-bold text-lg transition">
      Logout
    </button>

  </div>

</div>
