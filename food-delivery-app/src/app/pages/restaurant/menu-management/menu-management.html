
<div class="min-h-screen bg-gray-900 text-white pb-20">

  <!-- Header -->
  <div class="bg-gray-800 px-6 py-4 flex items-center gap-4 sticky top-0 z-50">
    <button routerLink="/restaurant/dashboard"
      class="text-gray-400 hover:text-white text-xl">←</button>
    <h2 class="text-xl font-bold flex-1">Menu Management</h2>
    <button (click)="openAdd()"
      class="bg-green-600 hover:bg-green-700 px-4 py-2
             rounded-lg text-sm font-semibold transition">
      + Add Item
    </button>
  </div>

  <div class="px-6 pt-6">

    <!-- Add/Edit form -->
    <div *ngIf="showForm"
         class="bg-gray-800 rounded-2xl p-6 border border-gray-700 mb-6">
      <h3 class="font-bold mb-4">
        {{ editingItem ? 'Edit Item' : 'Add New Item' }}
      </h3>
      <div class="space-y-3">
        <div>
          <label class="block text-sm text-gray-400 mb-1">Item Name</label>
          <input type="text" [(ngModel)]="form.itemName"
                 placeholder="Enter item name"
                 class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600
                        focus:border-green-500 outline-none text-white"/>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Description</label>
          <input type="text" [(ngModel)]="form.description"
                 placeholder="Enter description"
                 class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600
                        focus:border-green-500 outline-none text-white"/>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">Price (₹)</label>
          <input type="number" [(ngModel)]="form.price"
                 placeholder="Enter price"
                 class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600
                        focus:border-green-500 outline-none text-white"/>
        </div>
        <div class="flex gap-3">
          <button (click)="saveItem()"
            class="flex-1 bg-green-600 hover:bg-green-700 p-3
                   rounded-xl font-semibold transition">
            {{ editingItem ? 'Update' : 'Add Item' }}
          </button>
          <button (click)="cancel()"
            class="flex-1 bg-gray-700 hover:bg-gray-600 p-3
                   rounded-xl font-semibold transition">
            Cancel
          </button>
        </div>
      </div>
    </div>

    <!-- Menu items list -->
    <div class="space-y-3">
      <div *ngFor="let item of menuItems"
           class="bg-gray-800 rounded-xl p-4 border border-gray-700
                  flex items-center gap-4">

        <div class="w-14 h-14 bg-green-900 rounded-xl flex items-center
                    justify-center text-2xl flex-shrink-0">
          🍴
        </div>

        <div class="flex-1">
          <h3 class="font-semibold">{{ item.itemName }}</h3>
          <p class="text-gray-400 text-sm">{{ item.description }}</p>
          <span class="text-green-400 font-bold">₹{{ item.price }}</span>
        </div>

        <div class="flex flex-col gap-2">
          <button (click)="openEdit(item)"
            class="bg-amber-600 hover:bg-amber-700 px-3 py-1
                   rounded-lg text-sm transition">
            Edit
          </button>
          <button (click)="deleteItem(item.itemId)"
            class="bg-red-600 hover:bg-red-700 px-3 py-1
                   rounded-lg text-sm transition">
            Delete
          </button>
        </div>

      </div>
    </div>

  </div>

</div>
